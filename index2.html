<!DOCTYPE html>
<html>

<head>
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>📌 Kanban Board</h1>

    <div class="board">
        <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>To Do</h2>
            <input type="text" placeholder="Add task" onkeydown="addTask(event, 'todo')">
        </div>

        <div class="column" id="inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>In Progress</h2>
        </div>

        <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Done</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
